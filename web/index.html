<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koru</title>
  <script>
    // Apply a saved theme override before first paint, so a stored preference
    // that disagrees with the OS default doesn't flash the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('koru-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <meta name="description" content="A channel vocoder that simulates how cochlear implant users perceive music. Upload an audio file — or try a sample — and hear it degraded the way a CI would process it, entirely in your browser.">

  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <meta property="og:type" content="website">
  <meta property="og:title" content="As Heard Through a Cochlear Implant">
  <meta property="og:description" content="A channel vocoder that simulates how cochlear implant users perceive music. Upload an audio file — or try a sample — and hear it degraded the way a CI would process it, entirely in your browser.">
  <meta property="og:url" content="https://bekadavis9.github.io/koru/">
  <meta property="og:image" content="https://bekadavis9.github.io/koru/icons/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="As Heard Through a Cochlear Implant">
  <meta name="twitter:description" content="A channel vocoder that simulates how cochlear implant users perceive music. Upload an audio file — or try a sample — and hear it degraded the way a CI would process it, entirely in your browser.">
  <meta name="twitter:image" content="https://bekadavis9.github.io/koru/icons/og-image.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #e6edf3;
      --text-secondary: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --text-faint: #484f58;

      --accent: #58a6ff;
      --accent-rgb: 88,166,255;
      --accent-light: #79b8ff;
      --accent-lighter: #a5c8ff;
      --accent-fill: #1f4a8f;

      --success: #3fb950;

      --danger: #f85149;
      --danger-rgb: 248,81,73;

      --cis: #f0c844;
      --cis-strong: #d29922;
      --cis-rgb: 210,153,34;

      --fs4: #a78bfa;
      --fs4-strong: #8b5cf6;
      --fs4-rgb: 139,92,246;

      --muted-rgb: 139,148,158;
      --overlay-rgb: 255,255,255;

      --viz-track: #21262d;
      --viz-unreachable: #2d3748;
    }

    /* Light palette — applied when the OS/browser prefers light and the user
       hasn't explicitly forced dark via the toggle. */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #ffffff;
        --bg-card: #f6f8fa;
        --border: #d0d7de;
        --border-hover: #8c959f;
        --text: #1f2328;
        --text-secondary: #424a53;
        --text-muted: #59636e;
        --text-dim: #6e7781;
        --text-faint: #8c959f;

        --accent: #0969da;
        --accent-rgb: 9,105,218;
        --accent-light: #0550ae;
        --accent-lighter: #033d8b;
        --accent-fill: #ddf4ff;

        --success: #1a7f37;

        --danger: #cf222e;
        --danger-rgb: 207,34,46;

        --cis: #7d4e00;
        --cis-strong: #9a6700;
        --cis-rgb: 154,103,0;

        --fs4: #6639ba;
        --fs4-strong: #8250df;
        --fs4-rgb: 130,80,223;

        --muted-rgb: 100,110,120;
        --overlay-rgb: 0,0,0;

        --viz-track: #e8ebef;
        --viz-unreachable: #d0d7de;
      }
    }

    /* Same light palette, applied unconditionally when the toggle forces it
       regardless of system preference. */
    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-card: #f6f8fa;
      --border: #d0d7de;
      --border-hover: #8c959f;
      --text: #1f2328;
      --text-secondary: #424a53;
      --text-muted: #59636e;
      --text-dim: #6e7781;
      --text-faint: #8c959f;

      --accent: #0969da;
      --accent-rgb: 9,105,218;
      --accent-light: #0550ae;
      --accent-lighter: #033d8b;
      --accent-fill: #ddf4ff;

      --success: #1a7f37;

      --danger: #cf222e;
      --danger-rgb: 207,34,46;

      --cis: #7d4e00;
      --cis-strong: #9a6700;
      --cis-rgb: 154,103,0;

      --fs4: #6639ba;
      --fs4-strong: #8250df;
      --fs4-rgb: 130,80,223;

      --muted-rgb: 100,110,120;
      --overlay-rgb: 0,0,0;

      --viz-track: #e8ebef;
      --viz-unreachable: #d0d7de;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }

    .container { width: 100%; max-width: 680px; }

    header { text-align: center; margin-bottom: 16px; }
    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }

    /* ── Theme toggle ──────────────────────────────────────────────────── */
    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); font-size: 1.05rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .theme-toggle:hover { border-color: var(--border-hover); }

    /* Panel: connected card stack */
    .panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card {
      background: var(--bg-card);
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
    }
    .panel .card:last-child { border-bottom: none; }
    .section-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 14px;
    }
    .card-divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* ── Cochlea explainer card ─────────────────────────────────────────── */
    .cochlea-card { text-align: center; }
    #cochleaSvg { width: 100%; max-width: 240px; height: auto; display: block; margin: 0 auto; }
    .freq-ticks { position: relative; height: 18px; margin-top: 10px; }
    .freq-tick-lbl {
      position: absolute; transform: translateX(-50%);
      font-size: 0.62rem; color: var(--text-muted); white-space: nowrap; line-height: 18px;
    }
    .freq-bar {
      display: flex; height: 18px; border-radius: 4px; overflow: hidden;
      gap: 2px; background: var(--border); margin-top: 4px;
    }
    .freq-bar-seg { flex: 1; transition: background 0.12s ease; }
    #cochleaSvg polyline { transition: stroke 0.12s ease; }
    .freq-bar-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .freq-bar-labels span { font-size: 0.7rem; color: var(--text-muted); }

    /* Narrow viewports: 9 tick labels collide, so thin them to every other one. */
    @media (max-width: 500px) {
      .freq-tick-lbl { font-size: 0.56rem; }
      .freq-tick-lbl:nth-child(even) { display: none; }
    }
    .cochlea-explainer {
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.6;
      max-width: 500px; margin: 0 auto 20px;
    }
    .cochlea-caption {
      margin-top: 10px; font-size: 0.82rem; color: var(--text-muted);
      line-height: 1.5;
    }
    .caption-title {
      display: block; margin-bottom: 2px; color: var(--text-secondary); font-size: 0.85rem;
    }
    .caption-title strong { font-weight: 600; }

    /* ── Drop zone ──────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 20px; text-align: center; cursor: default;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone.dz-empty { cursor: pointer; }
    .drop-zone.dz-empty:hover { border-color: var(--accent); background: rgba(var(--accent-rgb),0.04); }
    .drop-zone.over { border-color: var(--accent); background: rgba(var(--accent-rgb),0.08); }
    .dz-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .dz-hint { color: var(--text-muted); font-size: 0.85rem; }
    .dz-samples {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 8px; margin-top: 14px; cursor: default;
    }
    .dz-samples-label { color: var(--text-dim); font-size: 0.72rem; }
    .dz-sample-btn {
      font-size: 0.75rem; color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .dz-sample-btn em { font-style: normal; color: var(--text-dim); }
    .dz-sample-btn:hover { border-color: var(--accent); color: var(--text); }
    .dz-sample-btn.active {
      border-color: var(--accent); color: var(--accent-light); background: rgba(var(--accent-rgb),0.08);
    }
    .dz-sample-btn.active em { color: var(--accent); }
    .dz-samples-compact { justify-content: flex-end; margin-top: 8px; }
    .dz-loading {
      display: none; align-items: center; justify-content: center;
      gap: 12px; min-height: 60px; color: var(--text-muted); font-size: 0.88rem;
    }
    .dz-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px;
    }
    .dz-action-btn {
      font-size: 0.72rem; color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .dz-action-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── Compact file row (replaces drop zone after pick) ────────────────── */
    .file-row { display: none; }
    .file-row-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .file-row-name {
      font-weight: 600; font-size: 0.88rem; color: var(--success);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;
    }
    .file-row-change {
      font-size: 0.75rem; color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .file-row-change:hover { border-color: var(--text-muted); color: var(--text); }
    .file-row audio { width: 100%; }

    /* ── Strategy selector ──────────────────────────────────────────────── */
    .era-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .era-row {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 16px 12px; background: var(--bg);
      border: 1px solid var(--border); border-top: 3px solid transparent; border-radius: 8px;
      color: var(--text); cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .era-row:hover:not(.active) { border-color: var(--border-hover); border-top-color: var(--border-hover); }
    .era-name { font-size: 0.93rem; font-weight: 700; }
    .era-desc { font-size: 0.78rem; color: var(--text-muted); }
    .era-row[data-strat="cis"].active {
      background: rgba(var(--cis-rgb),0.07); border-color: rgba(var(--cis-rgb),0.3); border-top-color: var(--cis-strong);
    }
    .era-row[data-strat="cis"].active .era-name { color: var(--cis); }
    .era-row[data-strat="fs4"].active {
      background: rgba(var(--fs4-rgb),0.07); border-color: rgba(var(--fs4-rgb),0.3); border-top-color: var(--fs4-strong);
    }
    .era-row[data-strat="fs4"].active .era-name { color: var(--fs4); }
    .era-row[data-mode="sim"].active {
      background: rgba(var(--accent-rgb),0.07); border-color: rgba(var(--accent-rgb),0.3); border-top-color: var(--accent);
    }
    .era-row[data-mode="sim"].active .era-name { color: var(--accent-light); }
    .era-row[data-mode="orig"].active {
      background: rgba(var(--accent-rgb),0.07); border-color: rgba(var(--accent-rgb),0.3); border-top-color: var(--accent);
    }
    .era-row[data-mode="orig"].active .era-name { color: var(--accent-light); }

    /* ── Channel selector ───────────────────────────────────────────────── */
    .ch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 480px; margin: 0 auto; }
    .ch-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); cursor: pointer; padding: 14px 8px; text-align: center;
      transition: all 0.15s;
    }
    .ch-btn:hover:not(.active) { border-color: var(--text-muted); }
    .ch-btn.active { background: var(--accent-fill); border-color: var(--accent); }
    .ch-num   { display: block; font-size: 1.35rem; font-weight: 700; line-height: 1; }
    .ch-label { display: block; font-size: 0.68rem; color: var(--text-muted); margin-top: 5px; }
    .ch-btn.active .ch-label { color: var(--accent-lighter); }
    /* Channel active color follows selected strategy */
    #settingsCard[data-strat="cis"] .ch-btn.active {
      background: rgba(var(--cis-rgb),0.1); border-color: rgba(var(--cis-rgb),0.6);
    }
    #settingsCard[data-strat="cis"] .ch-btn.active .ch-num  { color: var(--cis); }
    #settingsCard[data-strat="cis"] .ch-btn.active .ch-label { color: var(--cis-strong); }
    #settingsCard[data-strat="fs4"] .ch-btn.active {
      background: rgba(var(--fs4-rgb),0.1); border-color: rgba(var(--fs4-rgb),0.6);
    }
    #settingsCard[data-strat="fs4"] .ch-btn.active .ch-num  { color: var(--fs4); }
    #settingsCard[data-strat="fs4"] .ch-btn.active .ch-label { color: var(--fs4-strong); }

    /* ── A/B toggle ─────────────────────────────────────────────────────── */
    .ab-toggle {
      display: flex; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; margin-bottom: 16px;
    }
    .ab-btn {
      flex: 1; padding: 10px 8px; text-align: center;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer; background: none; color: var(--text-muted);
      border: none; font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .ab-btn + .ab-btn { border-left: 1px solid var(--border); }
    .ab-btn.ab-active { background: var(--accent-fill); color: var(--text); }
    .ab-btn:hover:not(.ab-active) { background: rgba(var(--overlay-rgb),0.04); color: var(--text-secondary); }

    /* ── Custom audio player bar ───────────────────────────────────────── */
    .custom-player {
      display: flex; align-items: center; gap: 10px; padding: 6px 0;
    }
    .cp-btn {
      background: none; border: none; color: var(--text); cursor: pointer;
      font-size: 1rem; padding: 0; width: 20px; flex-shrink: 0; line-height: 1;
    }
    .cp-track {
      position: relative; flex: 1; height: 4px; background: var(--border);
      border-radius: 2px; cursor: pointer;
    }
    .cp-fill {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent); border-radius: 2px; width: 0%;
      pointer-events: none;
    }
    .cp-time {
      font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0;
    }

    /* ── Download button (matches Change file style) ───────────────────── */
    .file-row-download {
      font-size: 0.75rem; color: var(--text-muted); background: none;
      border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .file-row-download:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── Audio mode: grey out settings when original is playing ─────────── */
    /* Use [data-strat] to beat the strategy-specific ch-btn rules above */
    #settingsCard.playing-original[data-strat] .ch-btn.active {
      background: rgba(var(--muted-rgb),0.08); border-color: rgba(var(--muted-rgb),0.25);
    }
    #settingsCard.playing-original[data-strat] .ch-btn.active .ch-num  { color: var(--text-dim); }
    #settingsCard.playing-original[data-strat] .ch-btn.active .ch-label { color: var(--text-dim); }
    .playing-original .era-row[data-strat="cis"].active,
    .playing-original .era-row[data-strat="fs4"].active {
      background: rgba(var(--muted-rgb),0.05);
      border-color: rgba(var(--muted-rgb),0.2); border-top-color: rgba(var(--muted-rgb),0.35);
    }
    .playing-original .era-row[data-strat].active .era-name { color: var(--text-dim); }

    /* ── Sim card states ────────────────────────────────────────────────── */
    .sim-idle {
      display: flex; align-items: center; justify-content: center;
      min-height: 52px; color: var(--text-faint); font-size: 0.88rem;
    }
    .sim-loading {
      display: none; align-items: center; gap: 12px;
      min-height: 52px; color: var(--text-muted); font-size: 0.88rem;
    }
    .sim-loading.show { display: flex; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sim-spinner {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .sim-result { display: none; }
    .sim-result.show { display: block; }

    /* Accent stripe on sim card once result is ready */
    .card.has-result { position: relative; overflow: hidden; }
    .card.has-result::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent);
    }

    /* Subtle spinner next to label while re-processing */
    .card.sim-updating .section-label::after {
      content: '';
      display: inline-block; vertical-align: middle;
      width: 10px; height: 10px; margin-left: 8px;
      border: 1.5px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    .error {
      margin-top: 12px; padding: 12px 16px; display: none;
      background: rgba(var(--danger-rgb),0.1); border: 1px solid var(--danger);
      border-radius: 6px; color: var(--danger); font-size: 0.88rem;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
<button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">🌙</button>
<div class="container">

  <header>
    <h1>As Heard Through a Cochlear Implant</h1>
  </header>

  <div class="panel">

    <!-- Card 0: Cochlea explainer -->
    <div class="card cochlea-card">
<svg id="cochleaSvg" viewBox="0 0 260 260"></svg>
      <div class="freq-ticks" id="freqTicks"></div>
      <div class="freq-bar" id="freqBar"></div>
      <div class="freq-bar-labels">
        <span>Bass</span>
        <span>Treble</span>
      </div>
      <p class="cochlea-caption" id="cochleaCaption"></p>
    </div>

    <!-- Card 2: Settings -->
    <div class="card" id="settingsCard" data-strat="cis">
      <div class="section-label">CI Generation</div>
      <div class="era-list">
        <button class="era-row active" data-strat="cis" onclick="setStrat('cis')">
          <span class="era-name">Classic CI</span>
          <span class="era-desc">Rhythm preserved, pitch stripped</span>
        </button>
        <button class="era-row" data-strat="fs4" onclick="setStrat('fs4')">
          <span class="era-name">Advanced CI</span>
          <span class="era-desc">Low-frequency pitch preserved</span>
        </button>
      </div>

      <div class="card-divider"></div>

      <div class="section-label">Frequency Channels</div>
      <div class="ch-grid">
        <button class="ch-btn active" onclick="setCh(4)">
          <span class="ch-num">4</span><span class="ch-label">low</span>
        </button>
        <button class="ch-btn" onclick="setCh(12)">
          <span class="ch-num">12</span><span class="ch-label">typical</span>
        </button>
        <button class="ch-btn" onclick="setCh(24)">
          <span class="ch-num">24</span><span class="ch-label">high</span>
        </button>
      </div>
    </div>

    <!-- Card 3: Audio (upload + playback) -->
    <div class="card" id="simCard">
      <div class="section-label">Audio</div>

      <div class="drop-zone dz-empty" id="dz">
        <div id="dzEmpty">
          <div class="dz-icon">🎵</div>
          <div class="dz-hint">Drop an audio file here, or click to browse</div>
          <div class="dz-samples" onclick="event.stopPropagation()">
            <span class="dz-samples-label">or try a sample</span>
            <button class="dz-sample-btn" data-sample="andante" onclick="loadSample('samples/schubert-andante.mp3', 'schubert-andante.mp3', 'andante')">Schubert — Andante <em>(melodic)</em></button>
            <button class="dz-sample-btn" data-sample="allegro" onclick="loadSample('samples/schubert-allegro.mp3', 'schubert-allegro.mp3', 'allegro')">Schubert — Allegro vivace <em>(rhythmic)</em></button>
          </div>
        </div>
        <div class="dz-loading" id="dzLoading">
          <div class="sim-spinner"></div>
          <span id="simLoadingText">Processing…</span>
        </div>
        <div id="dzPlayer" style="display:none">
          <audio id="player" style="display:none"></audio>
          <div class="custom-player">
            <button class="cp-btn" id="cpBtn">▶</button>
            <div class="cp-track" id="cpTrack">
              <div class="cp-fill" id="cpFill"></div>
            </div>
            <span class="cp-time" id="cpTime">0:00 / 0:00</span>
          </div>
          <div class="dz-actions">
            <button class="dz-action-btn" onclick="document.getElementById('fileInput').click()">Change file</button>
            <button id="dlBtn" class="dz-action-btn">↓ Download</button>
          </div>
          <div class="dz-samples dz-samples-compact">
            <span class="dz-samples-label">try a sample</span>
            <button class="dz-sample-btn" data-sample="andante" onclick="loadSample('samples/schubert-andante.mp3', 'schubert-andante.mp3', 'andante')">Andante <em>(melodic)</em></button>
            <button class="dz-sample-btn" data-sample="allegro" onclick="loadSample('samples/schubert-allegro.mp3', 'schubert-allegro.mp3', 'allegro')">Allegro vivace <em>(rhythmic)</em></button>
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept=".wav,.mp3,.flac,.ogg,.aac,.m4a,audio/*" style="display:none">

      <div id="abSection" style="display:none; margin-top:14px">
        <div class="era-list">
          <button class="era-row" data-mode="orig" id="btnOrig" onclick="setAbMode('original')">
            <span class="era-name">Original</span>
            <span class="era-desc">Unprocessed audio</span>
          </button>
          <button class="era-row active" data-mode="sim" id="btnSim" onclick="setAbMode('sim')">
            <span class="era-name">CI Simulation</span>
            <span class="era-desc">Cochlear implant processing</span>
          </button>
        </div>
      </div>

      <div class="error" id="err"></div>
    </div>

  </div><!-- /.panel -->

</div>
<script type="module">
  import init, { process_audio } from './pkg/ci_music.js';
  import { F_LOW, F_HIGH, bandFreqs, bandColor, fmtHz, bandBinRange, bandEnergy, litThreshold, ANALYSER_FFT_SIZE } from './viz.js';

  // ── WASM initialisation ───────────────────────────────────────────────────
  // Start loading WASM immediately; doSimulate awaits this before processing.
  const wasmReady = init();

  // ── AudioContext (one per page load) ─────────────────────────────────────
  // Created once and reused across all simulate calls. Creating a new
  // AudioContext on every call causes browser warnings after ~6 instances.
  // decodeAudioData works even when the context is suspended (before user
  // interaction resumes it), so creating it at module scope is safe.
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Theme toggle ──────────────────────────────────────────────────────────
  const THEME_KEY = 'koru-theme';
  const themeToggleBtn = document.getElementById('themeToggle');
  const lightMedia = window.matchMedia('(prefers-color-scheme: light)');

  function effectiveTheme() {
    const override = document.documentElement.getAttribute('data-theme');
    return override || (lightMedia.matches ? 'light' : 'dark');
  }
  function updateThemeToggleUI() {
    const t = effectiveTheme();
    themeToggleBtn.textContent = t === 'light' ? '🌙' : '☀️';
    const label = t === 'light' ? 'Switch to dark theme' : 'Switch to light theme';
    themeToggleBtn.setAttribute('aria-label', label);
    themeToggleBtn.title = label;
  }
  themeToggleBtn.addEventListener('click', () => {
    const next = effectiveTheme() === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
    updateThemeToggleUI();
  });
  // Keep the icon in sync if the OS theme changes while no override is set.
  lightMedia.addEventListener('change', () => {
    if (!localStorage.getItem(THEME_KEY)) updateThemeToggleUI();
  });
  updateThemeToggleUI();

  // ── File save helper ─────────────────────────────────────────────────────
  async function saveFile(blob, suggestedName) {
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName,
          types: [{ description: 'Audio', accept: { 'audio/*': ['.wav', '.mp3', '.flac', '.ogg', '.aac', '.m4a'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = suggestedName; a.click();
  }

  // ── App state ────────────────────────────────────────────────────────────
  let file      = null;
  let channels  = 4;
  let strategy  = 'cis';
  let abMode    = 'sim';
  let currentSample = null;
  let origSrc   = null;
  let simSrc    = null;
  let simReady  = false;
  let _hasResult  = false;
  let _simTimer   = null;

  // ── Live frequency visualisation ──────────────────────────────────────────
  let bandPolylines = [];
  let bandBarSegs   = [];
  let bandReachable = [];
  let currentBandN  = 0;
  let analyser      = null;
  let freqData      = null;
  let vizRafId      = null;

  function ensureAnalyser() {
    if (analyser) return;
    const src = audioCtx.createMediaElementSource(playerEl);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = ANALYSER_FFT_SIZE;
    analyser.smoothingTimeConstant = 0.8;
    src.connect(analyser);
    analyser.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
  }

  function startViz() {
    audioCtx.resume();
    ensureAnalyser();
    if (vizRafId !== null) return;
    (function tick() {
      vizRafId = requestAnimationFrame(tick);
      const n = currentBandN;
      if (!n) return;
      analyser.getByteFrequencyData(freqData);
      const nyquist = audioCtx.sampleRate / 2;

      const threshold = litThreshold(freqData);

      for (let i = 0; i < n; i++) {
        if (!bandReachable[i]) continue;
        const [lo, hi] = bandFreqs(i, n);
        const [loIdx, hiIdx] = bandBinRange(lo, hi, nyquist, freqData.length);
        const avg = bandEnergy(freqData, loIdx, hiIdx);
        const color = avg > threshold ? bandColor(i, n) : 'var(--viz-unreachable)';
        if (bandPolylines[i]) bandPolylines[i].style.stroke = color;
        if (bandBarSegs[i])   bandBarSegs[i].style.background = color;
      }
    })();
  }

  function stopViz() {
    if (vizRafId !== null) { cancelAnimationFrame(vizRafId); vizRafId = null; }
    const n = currentBandN;
    for (let i = 0; i < n; i++) {
      if (!bandReachable[i]) continue;
      if (bandPolylines[i]) bandPolylines[i].style.stroke = bandColor(i, n);
      if (bandBarSegs[i])   bandBarSegs[i].style.background = bandColor(i, n);
    }
  }

  // ── File input ───────────────────────────────────────────────────────────
  const dz = document.getElementById('dz');
  const fi = document.getElementById('fileInput');

  dz.addEventListener('click', () => { if (!file) fi.click(); });
  ['dragover','dragenter'].forEach(ev =>
    dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('over'); }));
  ['dragleave','dragend'].forEach(ev =>
    dz.addEventListener(ev, () => dz.classList.remove('over')));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change', () => fi.files[0] && pick(fi.files[0]));

  function pick(f, sampleId = null) {
    file = f;
    currentSample = sampleId;
    updateSampleButtons();
    // A new file/sample means any previous playback no longer applies —
    // stop it and reset the play button so it doesn't show "pause" for
    // audio that isn't actually playing.
    playerEl.pause();
    cpBtn.textContent = '▶';
    if (origSrc) URL.revokeObjectURL(origSrc);
    origSrc = URL.createObjectURL(f);
    simReady = false;
    _hasResult = false;
    simSrc = null;
    setSimState('loading');
    scheduleSimulate(0);
  }

  // ── Bundled sample clips (for visitors without an audio file on hand) ─────
  function updateSampleButtons() {
    document.querySelectorAll('.dz-sample-btn').forEach(b =>
      b.classList.toggle('active', !!currentSample && b.dataset.sample === currentSample));
  }

  async function loadSample(path, name, id) {
    document.getElementById('err').classList.remove('show');
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error('Could not load sample audio.');
      const blob = await res.blob();
      pick(new File([blob], name, { type: 'audio/mpeg' }), id);
    } catch (e) {
      document.getElementById('err').textContent = e.message || 'Could not load sample audio.';
      document.getElementById('err').classList.add('show');
    }
  }
  window.loadSample = loadSample;

  // ── A/B toggle ───────────────────────────────────────────────────────────
  const playerEl     = document.getElementById('player');
  const settingsCard = document.getElementById('settingsCard');

  playerEl.addEventListener('play',  startViz);
  playerEl.addEventListener('pause', stopViz);
  playerEl.addEventListener('ended', stopViz);

  // ── Custom player controls ────────────────────────────────────────────────
  const cpBtn   = document.getElementById('cpBtn');
  const cpTrack = document.getElementById('cpTrack');
  const cpFill  = document.getElementById('cpFill');
  const cpTime  = document.getElementById('cpTime');

  function fmtTime(s) {
    if (!isFinite(s) || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    return `${m}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
  }
  function updateCp() {
    const pct = playerEl.duration ? (playerEl.currentTime / playerEl.duration) * 100 : 0;
    cpFill.style.width = pct + '%';
    cpTime.textContent = `${fmtTime(playerEl.currentTime)} / ${fmtTime(playerEl.duration)}`;
  }
  playerEl.addEventListener('timeupdate',     updateCp);
  playerEl.addEventListener('loadedmetadata', updateCp);
  playerEl.addEventListener('play',  () => { cpBtn.textContent = '⏸'; });
  playerEl.addEventListener('pause', () => { cpBtn.textContent = '▶'; });
  playerEl.addEventListener('ended', () => { cpBtn.textContent = '▶'; updateCp(); });
  cpBtn.addEventListener('click', () => {
    audioCtx.resume();
    playerEl.paused ? playerEl.play().catch(() => {}) : playerEl.pause();
  });
  let cpSeeking = false;
  function cpSeek(e) {
    const r = cpTrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    if (playerEl.duration) playerEl.currentTime = pct * playerEl.duration;
  }
  cpTrack.addEventListener('mousedown', e => { cpSeeking = true; cpSeek(e); });
  document.addEventListener('mousemove', e => { if (cpSeeking) cpSeek(e); });
  document.addEventListener('mouseup', () => { cpSeeking = false; });

  function setAbMode(mode) {
    const pos        = playerEl.currentTime;
    const wasPlaying = !playerEl.paused;
    abMode = mode;

    const src = mode === 'original' ? origSrc : simSrc;
    if (src && src !== playerEl.src) {
      playerEl.src = src;
      playerEl.load();
      playerEl.addEventListener('canplaythrough', () => {
        playerEl.currentTime = Math.min(pos, playerEl.duration || 0);
        if (wasPlaying) playerEl.play().catch(() => {});
      }, { once: true });
    }

    document.getElementById('btnOrig').classList.toggle('active', mode === 'original');
    document.getElementById('btnSim').classList.toggle('active', mode === 'sim');
    document.getElementById('dlBtn').style.display = mode === 'original' ? 'none' : '';
    buildCochlea(mode === 'original' ? null : channels);
    updateSettingsColor();
  }

  // ── Sim card state machine ───────────────────────────────────────────────
  function setSimState(state) {
    if (state === 'idle') file = null;
    document.getElementById('dzEmpty').style.display   = state === 'idle'    ? '' : 'none';
    document.getElementById('dzLoading').style.display = state === 'loading' ? 'flex' : 'none';
    document.getElementById('dzPlayer').style.display  = state === 'ready'   ? '' : 'none';
    document.getElementById('abSection').style.display = state === 'ready'   ? '' : 'none';
    document.getElementById('simCard').classList.toggle('has-result', state === 'ready');
    document.getElementById('dz').classList.toggle('dz-empty', state === 'idle');
  }

  // ── Simulation ───────────────────────────────────────────────────────────
  function scheduleSimulate(delay = 200) {
    if (!file) return;
    clearTimeout(_simTimer);
    _simTimer = setTimeout(doSimulate, delay);
  }

  function setUpdating(on) {
    document.getElementById('simCard').classList.toggle('sim-updating', on);
  }

  function updateSettingsColor() {
    settingsCard.classList.toggle('playing-original', !simReady || abMode === 'original');
  }

  async function doSimulate() {
    if (!file) return;

    const isFirstResult = !_hasResult;
    const pos        = _hasResult ? playerEl.currentTime : 0;
    const wasPlaying = _hasResult && abMode === 'sim' && !playerEl.paused;

    if (_hasResult) {
      setUpdating(true);
    } else {
      setSimState('loading');
    }

    document.getElementById('err').classList.remove('show');

    try {
      // Wait for WASM to be ready (usually already done by the time user picks a file)
      document.getElementById('simLoadingText').textContent = 'Loading processor…';
      await wasmReady;

      // Decode audio file using the browser's built-in Web Audio API
      document.getElementById('simLoadingText').textContent = 'Decoding audio…';
      const arrayBuffer = await file.arrayBuffer();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

      // Downmix to mono: arithmetic mean of all channels.
      // Matches audio.rs (Symphonia): frame.iter().sum() / num_channels.
      // Handles mono, stereo, and surround (e.g. 5.1) identically to the local server.
      let samples;
      const numChannels = audioBuffer.numberOfChannels;
      if (numChannels === 1) {
        // Fast path: no copy needed for mono
        samples = audioBuffer.getChannelData(0);
      } else {
        const length = audioBuffer.length;
        const channelData = Array.from({ length: numChannels }, (_, c) => audioBuffer.getChannelData(c));
        samples = new Float32Array(length);
        for (let i = 0; i < length; i++) {
          let sum = 0;
          for (let c = 0; c < numChannels; c++) sum += channelData[c][i];
          samples[i] = sum / numChannels;
        }
      }

      // process_audio() is synchronous WASM — it blocks the main thread for the
      // duration of processing. Yielding here (setTimeout 0) lets the browser
      // paint the "Processing…" state before we hand control to WASM.
      document.getElementById('simLoadingText').textContent = 'Processing…';
      await new Promise(r => setTimeout(r, 20));

      // Run the vocoder in WASM — synchronous, returns WAV bytes.
      // An empty result means WAV encoding failed on the Rust side (should not
      // happen in normal operation, but guard here so we don't show a broken player).
      const wavBytes = process_audio(samples, audioBuffer.sampleRate, channels, strategy, 'noise');
      if (wavBytes.length === 0) throw new Error('Vocoder returned no audio — WAV encoding failed.');
      const blob = new Blob([wavBytes], { type: 'audio/wav' });

      if (simSrc) URL.revokeObjectURL(simSrc);
      simSrc = URL.createObjectURL(blob);

      const ext  = file.name.lastIndexOf('.');
      const base = ext >= 0 ? file.name.slice(0, ext) : file.name;
      const simName = `${base}_ci_${channels}ch_${strategy}.wav`;
      document.getElementById('dlBtn').onclick = () => saveFile(blob, simName);

      _hasResult = true;
      simReady   = true;
      setSimState('ready');
      setUpdating(false);

      if (isFirstResult) {
        // Default to the unprocessed original so listeners have a baseline
        // to compare against before choosing a CI experience.
        abMode = 'original';
        playerEl.src = origSrc;
        playerEl.load();
      } else if (abMode === 'sim') {
        // Re-simulated because a setting changed while already listening to
        // the simulation — reload with the updated audio at the same position.
        playerEl.src = simSrc;
        playerEl.load();
        if (wasPlaying) {
          playerEl.addEventListener('canplaythrough', () => {
            playerEl.currentTime = Math.min(pos, playerEl.duration || 0);
            playerEl.play().catch(() => {});
          }, { once: true });
        }
      }
      document.getElementById('btnOrig').classList.toggle('active', abMode === 'original');
      document.getElementById('btnSim').classList.toggle('active', abMode === 'sim');
      buildCochlea(abMode === 'original' ? null : channels);
      updateSettingsColor();
    } catch (e) {
      document.getElementById('err').textContent = e.message || String(e);
      document.getElementById('err').classList.add('show');
      setUpdating(false);
      if (!_hasResult) setSimState('idle');
    }
  }

  // ── Settings ─────────────────────────────────────────────────────────────
  function setCh(n) {
    channels = n;
    document.querySelectorAll('.ch-btn').forEach(b =>
      b.classList.toggle('active', +b.querySelector('.ch-num').textContent === n));
    if (abMode === 'sim') buildCochlea(n);
    updateSettingsColor();
    scheduleSimulate(150);
  }

  function setStrat(s) {
    strategy = s;
    settingsCard.dataset.strat = s;
    document.querySelectorAll('.era-row[data-strat]').forEach(b =>
      b.classList.toggle('active', b.dataset.strat === s));
    updateSettingsColor();
    scheduleSimulate(150);
  }

  // Make settings handlers global (called from inline onclick attributes)
  window.setCh = setCh;
  window.setStrat = setStrat;
  window.setAbMode = setAbMode;

  // ── Cochlea spiral visualization ─────────────────────────────────────────
  const SVG_CX = 130, SVG_CY = 130, R_MAX = 105, R_MIN = 14;
  const THETA_MAX = 2.5 * 2 * Math.PI;
  const K_SP = Math.log(R_MAX / R_MIN) / THETA_MAX;
  // F_LOW, F_HIGH, bandFreqs, bandColor, fmtHz, bandBinRange, bandEnergy, litThreshold, ANALYSER_FFT_SIZE imported from viz.js

  function spiralPt(theta) {
    const r = R_MAX * Math.exp(-K_SP * theta);
    return [SVG_CX + r * Math.cos(theta), SVG_CY + r * Math.sin(theta)];
  }

  const CAPTIONS = {
    4:  { bold: '4 Electrodes',  rest: 'Low',     body: 'Large gaps between electrodes. Rhythm survives; pitch is mostly lost.' },
    12: { bold: '12 Electrodes', rest: 'Typical', body: 'Today\'s standard CI. Music becomes noticeably more recognizable.' },
    24: { bold: '24 Electrodes', rest: 'High',    body: 'Near-full cochlear coverage. Pitch and melody begin to return.' },
  };

  function buildCochlea(n) {
    stopViz();
    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('cochleaSvg');
    svg.innerHTML = '';

    const full = n === null;
    const drawN = full ? 48 : n;
    bandPolylines = [];
    bandBarSegs   = [];
    bandReachable = [];
    currentBandN  = drawN;

    // Background tube
    const bgPts = [];
    for (let i = 0; i <= 360; i++) {
      const [x, y] = spiralPt(THETA_MAX * i / 360);
      bgPts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
    }
    const bg = document.createElementNS(NS, 'polyline');
    bg.setAttribute('points', bgPts.join(' '));
    bg.setAttribute('fill', 'none');
    bg.style.stroke = 'var(--viz-track)';
    bg.setAttribute('stroke-width', '20');
    bg.setAttribute('stroke-linecap', 'round');
    bg.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(bg);

    // Colored band segments — i=0 lowest freq (apex), i=drawN-1 highest (base)
    for (let i = 0; i < drawN; i++) {
      const t0 = THETA_MAX * (drawN - 1 - i) / drawN;
      const t1 = THETA_MAX * (drawN - i) / drawN;
      const steps = Math.max(40, Math.round(80 * (t1 - t0) / THETA_MAX));
      const pts = [];
      for (let j = 0; j <= steps; j++) {
        const [x, y] = spiralPt(t0 + (t1 - t0) * j / steps);
        pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
      }
      const pl = document.createElementNS(NS, 'polyline');
      pl.setAttribute('points', pts.join(' '));
      pl.setAttribute('fill', 'none');
      const tMid = THETA_MAX * (drawN - 0.5 - i) / drawN;
      const reachable = full || tMid <= THETA_MAX * 0.625;
      pl.style.stroke = reachable ? bandColor(i, drawN) : 'var(--viz-unreachable)';
      bandPolylines.push(pl); bandReachable.push(reachable);
      pl.setAttribute('stroke-width', '14');
      pl.setAttribute('stroke-linecap', 'round');
      pl.setAttribute('stroke-linejoin', 'round');
      const [fLo, fHi] = bandFreqs(i, drawN);
      const ttl = document.createElementNS(NS, 'title');
      ttl.textContent = full
        ? `${fmtHz(fLo)} – ${fmtHz(fHi)}`
        : `Ch. ${i + 1}  ·  ${fmtHz(fLo)} – ${fmtHz(fHi)}`;
      pl.appendChild(ttl);
      svg.appendChild(pl);
    }

    // Modiolus cap
    const modCap = document.createElementNS(NS, 'circle');
    modCap.setAttribute('cx', SVG_CX); modCap.setAttribute('cy', SVG_CY);
    modCap.setAttribute('r', '11'); modCap.style.fill = 'var(--bg)';
    svg.appendChild(modCap);

    // Frequency tick labels — always 8 divisions as a fixed reference
    const TICK_N = 8;
    const ticks = document.getElementById('freqTicks');
    ticks.innerHTML = '';
    for (let k = 0; k <= TICK_N; k++) {
      const f = F_HIGH * Math.pow(F_LOW / F_HIGH, (TICK_N - k) / TICK_N);
      const span = document.createElement('span');
      span.className = 'freq-tick-lbl';
      span.style.left = `${(k / TICK_N) * 100}%`;
      if (k === 0) span.style.transform = 'none';
      else if (k === TICK_N) span.style.transform = 'translateX(-100%)';
      span.textContent = fmtHz(f);
      ticks.appendChild(span);
    }

    // Frequency bar
    const bar = document.getElementById('freqBar');
    bar.innerHTML = '';
    for (let i = 0; i < drawN; i++) {
      const seg = document.createElement('div');
      seg.className = 'freq-bar-seg';
      const tMidBar = THETA_MAX * (drawN - 0.5 - i) / drawN;
      const reachableBar = full || tMidBar <= THETA_MAX * 0.625;
      seg.style.background = reachableBar ? bandColor(i, drawN) : 'var(--viz-unreachable)';
      bar.appendChild(seg);
      bandBarSegs.push(seg);
    }

    // Caption
    if (full) {
      document.getElementById('cochleaCaption').innerHTML =
        `<span class="caption-title"><strong>Normal Hearing</strong>: ~3,500 Hair Cells</span>The full cochlea is active, translating the complete range of sound into precise neural signals.`;
    } else {
      const cap = CAPTIONS[n] ?? { bold: `${n} Electrodes`, rest: '', body: `${n} electrodes sampling the cochlea's frequency range.` };
      document.getElementById('cochleaCaption').innerHTML =
        `<span class="caption-title"><strong>${cap.bold}</strong>: ${cap.rest}</span>${cap.body}`;
    }

    // Live viz works the same in full-range mode (48 reachable bands) as in
    // a reduced CI view, so it should keep running whenever audio is
    // actually playing — e.g. pre-selecting a strategy/channel count while
    // still listening to the original shouldn't kill the animation.
    if (!playerEl.paused) startViz();
  }

  // Initial render — full coverage (normal hearing), settings grayed until sim is ready
  buildCochlea(null);
  updateSettingsColor();
</script>
</body>
</html>
